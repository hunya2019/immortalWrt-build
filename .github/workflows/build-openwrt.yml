# Auto-generated GitHub Actions workflow for building OpenWrt
# Reference: https://github.com/kenzok8/openwrt_Build

name: OpenWrt Build

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Select build target'
        required: true
        default: 'nanopi-r3s'
        type: choice
        options:
        - immortalwrt-x86_64
        - nanopi-r3s

      openwrt_repo:
        description: 'OpenWrt source repository'
        required: false
        default: 'immortalwrt (official)'
        type: choice
        options:
        - immortalwrt (official)
        - lean
        - lienol
      openwrt_branch:
        description: 'OpenWrt source branch (auto-adjusted by repo)'
        required: false
        default: 'openwrt-25.12'
        type: choice
        options:
        - openwrt-25.12
        - openwrt-24.10
        - openwrt-23.05
        - master
        - snapshot
        - main
      config_path:
        description: 'Use custom .config file'
        required: false
        default: 'none'
        type: choice
        options:
        - none
        - .config
        - nanopi-r3s.config
      ssh:
        description: 'Enable SSH for menuconfig'
        required: false
        default: 'false'
        type: choice
        options:
        - 'false'
        - 'true'
  push:
    branches:
    - main

env:
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build ${{ github.event.inputs.target || 'OpenWrt' }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout this repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Free disk space
      uses: coder-xiaomo/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev libz-dev libexpat1-dev zlib1g-dev \
          python3 python3-setuptools rsync swig unzip file wget \
          ccache libelf-dev device-tree-compiler libgmp3-dev libmpc-dev libfuse-dev \
          libpython3-dev libncurses5-dev python3-pyelftools \
          ca-certificates aria2 jq

    - name: Get current date
      id: date
      run: |
        echo "date=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV
        echo "date2=$(date +'%m/%d %Y')" >> $GITHUB_ENV
        echo "date3=$(date +'%m.%d')" >> $GITHUB_ENV

    - name: Clone OpenWrt source
      run: |
        # Map repository choice to URL and validate branch
        case "${{ github.event.inputs.openwrt_repo }}" in
          "immortalwrt (official)")
            REPO_URL="https://github.com/immortalwrt/immortalwrt"
            # Valid branches for immortalwrt: openwrt-25.12, openwrt-24.10, openwrt-23.05, master
            VALID_BRANCHES=("openwrt-25.12" "openwrt-24.10" "openwrt-23.05" "master")
            DEFAULT_BRANCH="openwrt-25.12"
            ;;
          "lean")
            REPO_URL="https://github.com/coolsnowwolf/lede"
            # Valid branches for Lean: master, snapshot
            VALID_BRANCHES=("master" "snapshot")
            DEFAULT_BRANCH="master"
            ;;
          "lienol")
            REPO_URL="https://github.com/Lienol/openwrt"
            # Valid branches for Lienol: main, master, 22.03, 21.02
            VALID_BRANCHES=("main" "master" "22.03" "21.02")
            DEFAULT_BRANCH="main"
            ;;
          *)
            REPO_URL="https://github.com/immortalwrt/immortalwrt"
            VALID_BRANCHES=("openwrt-25.12" "openwrt-24.10" "openwrt-23.05" "master")
            DEFAULT_BRANCH="openwrt-25.12"
            ;;
        esac

        # Get selected branch
        SELECTED_BRANCH="${{ github.event.inputs.openwrt_branch }}"

        # Check if selected branch is valid for this repo
        BRANCH_VALID=0
        for branch in "${VALID_BRANCHES[@]}"; do
          if [ "$SELECTED_BRANCH" = "$branch" ]; then
            BRANCH_VALID=1
            break
          fi
        done

        # Use default branch if selected branch is not valid
        if [ $BRANCH_VALID -eq 0 ]; then
          echo "⚠️ Branch '$SELECTED_BRANCH' not valid for this repository"
          echo "Using default branch: $DEFAULT_BRANCH"
          FINAL_BRANCH=$DEFAULT_BRANCH
        else
          echo "✓ Using selected branch: $SELECTED_BRANCH"
          FINAL_BRANCH=$SELECTED_BRANCH
        fi

        echo "Repository: $REPO_URL"
        echo "Branch: $FINAL_BRANCH"

        # Clone with selected branch
        git clone --depth 1 --branch "$FINAL_BRANCH" \
          "$REPO_URL" openwrt

        # Save branch info for later use
        echo "OPENWRT_BRANCH=$FINAL_BRANCH" >> $GITHUB_ENV

    - name: Free up disk space
      run: |
        sudo mkdir -p -m 777 /mnt/openwrt/dl /mnt/openwrt/staging_dir /mnt/openwrt/build_dir
        ln -sf /mnt/openwrt/dl openwrt/dl
        ln -sf /mnt/openwrt/staging_dir openwrt/staging_dir
        ln -sf /mnt/openwrt/build_dir openwrt/build_dir

    - name: Run DIY1 script (before feeds update)
      working-directory: openwrt
      run: |
        if [ -f "../diy1.sh" ]; then
          chmod +x ../diy1.sh
          ../diy1.sh
        fi

    - name: Update feeds
      working-directory: openwrt
      run: |
        echo "=== First feeds update ==="
        ./scripts/feeds update -a || true

        echo ""
        echo "=== Installing feeds (with fallback) ==="
        ./scripts/feeds install -a || {
          echo "⚠️ First install attempt had issues, retrying..."
          sleep 5
          ./scripts/feeds install -a || echo "ℹ Some optional feeds failed, continuing..."
        }

        echo "✓ Feeds update completed"

    - name: Add plugin repositories
      working-directory: openwrt
      run: |
        # Add small-package (kenzok8)
        if ! grep -q "smpackage" feeds.conf.default; then
          echo "src-git smpackage https://github.com/kenzok8/small.git" >> feeds.conf.default
        fi

        # Add openwrt-packages (kenzok8)
        if ! grep -q "openwrt_packages" feeds.conf.default; then
          echo "src-git openwrt_packages https://github.com/kenzok8/openwrt-packages.git" >> feeds.conf.default
        fi

        echo "Updated feeds.conf.default:"
        tail -5 feeds.conf.default

        echo ""
        echo "=== Updating plugin feeds with retry logic ==="

        # Try updating all feeds with retry
        for attempt in 1 2 3; do
          echo "Attempt $attempt of 3..."
          ./scripts/feeds update -a && break
          if [ $attempt -lt 3 ]; then
            echo "⚠️ Feed update attempt $attempt failed, retrying in 10 seconds..."
            sleep 10
          fi
        done

        echo ""
        echo "=== Installing feeds ==="

        # Install feeds, continue even if some fail
        ./scripts/feeds install -a 2>&1 | tee feeds_install.log

        # Check if at least some feeds were installed
        if grep -q "Number of feeds" feeds_install.log || [ -d "feeds/packages" ]; then
          echo "✓ Feed installation completed"
        else
          echo "⚠️ Feed installation may have issues, but continuing..."
        fi

    - name: Prepare .config
      run: |
        # Priority: target-specific config > workflow choice > repo .config > defconfig
        CONFIG_FILE="${{ github.event.inputs.config_path }}"

        if [ "$CONFIG_FILE" != "none" ] && [ -n "$CONFIG_FILE" ] && [ -f "$CONFIG_FILE" ]; then
          cp "$CONFIG_FILE" openwrt/.config
        elif [ -f "${{ github.event.inputs.target }}.config" ]; then
          cp "${{ github.event.inputs.target }}.config" openwrt/.config
        elif [ -f ".config" ]; then
          cp ".config" openwrt/.config
        else
          cd openwrt && make defconfig
        fi

    - name: Run customize script
      run: |
        if [ -x "./customize.sh" ]; then
          chmod +x ./customize.sh
          ./customize.sh
        fi

    - name: Run DIY2 script (after config load, before compile)
      working-directory: openwrt
      run: |
        if [ -f "../diy2.sh" ]; then
          chmod +x ../diy2.sh
          ../diy2.sh
        fi

    - name: Setup SSH for menuconfig (optional)
      if: github.event.inputs.ssh == 'true'
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true

    - name: Download packages
      working-directory: openwrt
      run: |
        make download -j$(nproc)
        find dl -size -1024c -exec rm -f {} \;

    - name: Cache OpenWrt build
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: 'true'
        prefix: ${{ github.workspace }}/openwrt

    - name: Compile the firmware
      working-directory: openwrt
      run: |
        echo -e "$(($(nproc)+1)) thread compile"
        make -j$(($(nproc)+1)) || make -j1 V=s

    - name: Check space usage
      if: always()
      run: df -hT

    - name: Organize files
      id: organize
      if: success() && env.UPLOAD_FIRMWARE == 'true'
      run: |
        mkdir -p firmware
        # Copy firmware files
        find openwrt/bin/targets -type f \( -name "*sysupgrade*" -o -name "*combined*efi*" \) -exec cp {} firmware/ \; 2>/dev/null || true

        # Verify firmware files exist
        if [ -z "$(ls -A firmware/*.bin 2>/dev/null)$(ls -A firmware/*.squashfs* 2>/dev/null)" ]; then
          echo "❌ Error: No firmware files found in openwrt/bin/targets"
          exit 1
        fi

        # Save configs
        cp openwrt/.config firmware/build.config 2>/dev/null || true
        cp openwrt/build_dir/target-*/linux-*/linux-*/.config firmware/kernel.config 2>/dev/null || true

        # Generate version info
        cd firmware
        echo "v${{ env.date2 }}" > version.txt
        md5_output=$( (md5sum *sysupgrade* 2>/dev/null || md5sum *combined-efi* 2>/dev/null) | awk '{print $1}' ) || true
        echo "$md5_output" >> version.txt
        echo "OpenWrt-${{ env.OPENWRT_BRANCH }}" >> version.txt

        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: openwrt-${{ github.event.inputs.target }}-${{ env.date3 }}
        path: firmware
        retention-days: 30

    - name: Create Release and upload firmware
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ env.date }}-${{ github.event.inputs.target }}
        name: 'OpenWrt ${{ github.event.inputs.target }} - ${{ env.date2 }}'
        draft: false
        prerelease: false
        body: |
          ## Build Information
          - **Build Target**: ${{ github.event.inputs.target }}
          - **Build Date**: ${{ env.date2 }}
          - **Repository**: ${{ github.event.inputs.openwrt_repo }}
          - **Branch**: ${{ env.OPENWRT_BRANCH }}
          - **Commit**: ${{ github.sha }}

          ## Included Files
          - Firmware images (sysupgrade/combined)
          - `build.config` - Configuration file for next build
          - `kernel.config` - Linux kernel configuration
          - `version.txt` - Build metadata and MD5 hash

          ## How to Reuse Configuration
          1. Download `build.config` from this release
          2. Save as `.config` in your repository
          3. Trigger workflow with this `.config` file
        files: firmware/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 7
        keep_minimum_runs: 3

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: success() && env.UPLOAD_RELEASE == 'true'
      with:
        keep_latest: 10
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
