# Auto-generated GitHub Actions workflow for building OpenWrt
# Inspired by https://github.com/kenzok8/openwrt_Build

name: OpenWrt Build

on:
  workflow_dispatch:
    inputs:
      openwrt_repo:
        description: 'OpenWrt source repository URL'
        required: false
        default: 'https://github.com/immortalwrt/immortalwrt'
      openwrt_branch:
        description: 'OpenWrt source branch'
        required: false
        default: 'openwrt-25.12'
      config_path:
        description: 'Optional path to a .config (relative to repo root)'
        required: false
        default: ''
      ssh:
        description: 'Enable SSH connection for interactive menuconfig (true/false)'
        required: false
        default: 'false'
  push:
    branches:
    - main

env:
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build OpenWrt
    runs-on: ubuntu-latest
    steps:
    - name: Checkout this repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev libz-dev libexpat1-dev zlib1g-dev \
          python3 python3-setuptools rsync swig unzip file wget \
          ccache libelf-dev device-tree-compiler libgmp3-dev libmpc-dev libfuse-dev \
          libpython3-dev libncurses5-dev python3-pyelftools \
          python3-distutils ca-certificates

    - name: Clone OpenWrt source
      run: |
        git clone --depth 1 --branch "${{ github.event.inputs.openwrt_branch || env.openwrt_branch }}" \
          "${{ github.event.inputs.openwrt_repo || env.openwrt_repo }}" openwrt

    - name: Cache OpenWrt downloads
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/build_dir
        key: ${{ runner.os }}-openwrt-cache-${{ github.event.inputs.openwrt_branch || env.openwrt_branch }}-${{ hashFiles('**/feeds.conf*', '**/*.config') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-cache-${{ github.event.inputs.openwrt_branch || env.openwrt_branch }}-

    - name: Update feeds
      working-directory: openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Add plugin repositories
      working-directory: openwrt
      run: |
        sed -i '$a src-git smpackage https://github.com/kenzok8/small-package' feeds.conf.default
        sed -i '$a src-git openwrt_packages https://github.com/kenzok8/openwrt-packages' feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Prepare .config
      working-directory: openwrt
      run: |
        if [ -n "${{ github.event.inputs.config_path }}" ]; then
          cp "${{ github.workspace }}/${{ github.event.inputs.config_path }}" .config
        fi
        if [ ! -f .config ]; then
          make defconfig
        fi

    - name: Setup SSH for menuconfig (optional)
      if: github.event.inputs.ssh == 'true'
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true

    - name: Compile OpenWrt
      working-directory: openwrt
      run: |
        MAKEFLAGS="-j$(nproc)" make V=s

    - name: Organize firmware files
      if: success()
      run: |
        mkdir -p firmware
        # Copy firmware files (pick sysupgrade/combined images)
        find openwrt/bin/targets -type f \( -name "*sysupgrade*" -o -name "*combined*efi*" \) -exec cp {} firmware/ \; 2>/dev/null || true

        # Save the .config file for next build
        cp openwrt/.config firmware/build.config

        # Create version info
        echo "Build date: $(date +'%Y-%m-%d %H:%M:%S')" > firmware/BUILD_INFO.txt
        echo "OpenWrt branch: ${{ github.event.inputs.openwrt_branch }}" >> firmware/BUILD_INFO.txt
        echo "Commit: $(git -C openwrt rev-parse --short HEAD 2>/dev/null || echo 'N/A')" >> firmware/BUILD_INFO.txt

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: openwrt-firmware-${{ github.run_id }}
        path: firmware
        retention-days: 30

    - name: Create Release and upload firmware
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}-${{ github.run_id }}
        name: 'OpenWrt Build #${{ github.run_number }}'
        body: |
          ## Build Information
          - **Build Date**: ${{ github.event.inputs.openwrt_branch }}
          - **Branch**: ${{ github.event.inputs.openwrt_branch }}
          - **Commit**: ${{ github.sha }}

          ## Included Files
          - Firmware images (sysupgrade/combined)
          - `build.config` - Use this as `.config` for next build
          - `BUILD_INFO.txt` - Build details

          ## How to Use Config
          ```bash
          # Download build.config
          wget https://github.com/${{ github.repository }}/releases/download/build-${{ github.run_number }}-${{ github.run_id }}/build.config -O .config
          # Use it for next build
          ```
        files: |
          firmware/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
